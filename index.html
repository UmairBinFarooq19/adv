<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO meta -->
    <title>AdventuresKashmir — Premium Himalayan Adventures & Luxury Escapes</title>
    <meta
      name="description"
      content="Guided skiing, snowboarding and luxury adventure experiences across Kashmir. Handcrafted premium journeys through Gulmarg, Sonamarg, Pahalgam and the Himalayas."
    />
    <meta name="theme-color" content="#14322B" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AdventuresKashmir — Premium Himalayan Adventures" />
    <meta
      property="og:description"
      content="Handcrafted premium ski and adventure journeys across Kashmir."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Fraunces (display) + Plus Jakarta Sans (UI/body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- GitHub Pages SPA redirect handoff: decodes the /?/ URL that public/404.html
         produced and replays it into the History API before React mounts. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <!-- Site-level structured data (Organization + WebSite), present in the
         initial HTML so crawlers see it without executing the app. Per-page
         JSON-LD (Article, Breadcrumb, FAQ, TouristDestination, ImageGallery) is
         injected by the useSeo hook into a separate #ld-json script.
         Replace the example origin below with the real deployed domain — the
         same value you pass as VITE_SITE_URL to the sitemap generator. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "TravelAgency",
            "@id": "https://adventureskashmir.example/#organization",
            "name": "AdventuresKashmir",
            "url": "https://adventureskashmir.example/",
            "logo": "https://adventureskashmir.example/favicon.svg",
            "image": "https://adventureskashmir.example/og-image.jpg",
            "description": "Premium guided ski, trekking and luxury adventure journeys across Kashmir and Ladakh.",
            "areaServed": "Kashmir, Ladakh, India",
            "email": "hello@adventureskashmir.com",
            "telephone": "+91 194 000 0000",
            "address": { "@type": "PostalAddress", "streetAddress": "Boulevard Road, Dal Lake", "addressLocality": "Srinagar", "addressRegion": "J&K", "postalCode": "190001", "addressCountry": "IN" }
          },
          {
            "@type": "WebSite",
            "@id": "https://adventureskashmir.example/#website",
            "name": "AdventuresKashmir",
            "url": "https://adventureskashmir.example/",
            "inLanguage": "en",
            "publisher": { "@id": "https://adventureskashmir.example/#organization" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
