<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO meta -->
    <title>AdventuresKashmir — Premium Himalayan Adventures & Luxury Escapes</title>
    <meta
      name="description"
      content="Guided skiing, snowboarding and luxury adventure experiences across Kashmir. Handcrafted premium journeys through Gulmarg, Sonamarg, Pahalgam and the Himalayas."
    />
    <meta name="theme-color" content="#14322B" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AdventuresKashmir — Premium Himalayan Adventures" />
    <meta
      property="og:description"
      content="Handcrafted premium ski and adventure journeys across Kashmir."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Fraunces (display) + Plus Jakarta Sans (UI/body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- GitHub Pages SPA redirect handoff: decodes the /?/ URL that public/404.html
         produced and replays it into the History API before React mounts. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
